<!DOCTYPE html>
<html>
<body style="font-family: Arial; max-width: 500px; margin: 40px auto; padding: 20px; background: #f5f5f5;">

<h1 style="color: #1a56a0; text-align: center;">💳 Калькулятор финтех-выгоды</h1>
<p style="text-align:center; color:gray;">Узнайте, сколько вы сэкономите с цифровым банком за год</p>

<div style="background:white; padding:20px; border-radius:12px; margin-top:20px;">

  <p><b>Процент кешбэка вашего банка:</b></p>
  <input type="number" id="cashbackPct" placeholder="Например: 5" 
  style="font-size:18px; padding:10px; width:100%; border-radius:8px; border:1px solid #ccc;">

  <p><b>Расходы по карте в месяц:</b></p>
  <input type="number" id="spending" placeholder="Например: 40000" 
  style="font-size:18px; padding:10px; width:100%; border-radius:8px; border:1px solid #ccc;">

  <p><b>Откладываю в копилку в месяц:</b></p>
  <input type="number" id="savings" placeholder="Например: 5000" 
  style="font-size:18px; padding:10px; width:100%; border-radius:8px; border:1px solid #ccc;">

  <p></p>
  <button onclick="calculate()" 
  style="font-size:18px; padding:12px; width:100%; background:#1a56a0; color:white; border:none; border-radius:8px; cursor:pointer;">
  Посчитать →
  </button>

</div>

<div id="result" style="display:none; background:white; padding:20px; border-radius:12px; margin-top:16px;">
  <p>💳 Кешбэк за год: <b id="r1" style="color:#1a56a0"></b></p>
  <p>🏦 Доход от копилки: <b id="r2" style="color:#1a56a0"></b></p>
  <hr>
  <p style="font-size:20px;">💰 Итого выгода: <b id="r3" style="color:green; font-size:24px;"></b></p>
</div>

<script>
function calculate() {
  let pct = document.getElementById("cashbackPct").value / 100;
  let spending = document.getElementById("spending").value;
  let savings = document.getElementById("savings").value;
  let cashback = Math.round(spending * pct * 12);
  let savingsIncome = Math.round(savings * 12 * 0.16 * 0.5);
  let total = cashback + savingsIncome;
  document.getElementById("r1").textContent = cashback + " ₽";
  document.getElementById("r2").textContent = savingsIncome + " ₽";
  document.getElementById("r3").textContent = total + " ₽";
  document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
